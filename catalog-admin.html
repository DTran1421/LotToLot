<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lot Tracking - Catalog</title>
<style>
  :root{--navy:#0f2a47;--bg:#f4f6f8;--line:#dbe2e8;--ink:#172a3a;--muted:#5f7385;--good:#1b7a4d;--good-bg:#e7f5ee;--bad:#b3261e;--bad-bg:#fcebea;--neutral-bg:#eef2f6;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,Arial,sans-serif;color:var(--ink);font-size:14px;}
  .wrap{max-width:1500px;margin:0 auto;padding:18px;}
  .masthead{background:var(--navy);color:#fff;border-radius:10px;padding:18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .masthead h1{margin:0 0 4px;font-size:18px;}
  .masthead p{margin:0;font-size:12.5px;color:#c9d8e6;}
  .masthead a{color:#cfe0f0;font-size:12px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;}
  .card h2{margin:0 0 12px;font-size:15px;color:var(--navy);}
  .grid{display:grid;gap:10px;}
  .grid.cols-5{grid-template-columns:1.4fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;}
  @media (max-width:780px){
    .grid.cols-5{grid-template-columns:1fr 1fr;}
  }
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
  input,select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;}
  button{padding:9px 16px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
  button.secondary{background:#fff;color:var(--navy);border:1px solid var(--line);}
  button.danger{background:#fff;color:var(--bad);border:1px solid #e3b3af;}
  .row-actions{display:flex;gap:8px;margin-top:12px;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  td{word-break:break-word;overflow-wrap:break-word;}
  th{word-break:normal;overflow-wrap:break-word;}
  @media (min-width:781px){
    table{table-layout:fixed;}
    /* Instrument, Material type, Item, Mfr name, Mfr ref#, McKesson ref#, Pack/unit size, Storage Temp, Storage Location, Vendor, Actions */
    th:nth-child(1),td:nth-child(1){width:13%;}
    th:nth-child(2),td:nth-child(2){width:7%;}
    th:nth-child(3),td:nth-child(3){width:12%;}
    th:nth-child(4),td:nth-child(4){width:8%;}
    th:nth-child(5),td:nth-child(5){width:8%;}
    th:nth-child(6),td:nth-child(6){width:8%;}
    th:nth-child(7),td:nth-child(7){width:8%;}
    th:nth-child(8),td:nth-child(8){width:9%;}
    th:nth-child(9),td:nth-child(9){width:13%;}
    th:nth-child(10),td:nth-child(10){width:6%;}
    th:nth-child(11),td:nth-child(11){width:8%;}
  }
  th,td{border-bottom:1px solid var(--line);padding:7px 10px;text-align:left;}
  th{font-size:10.5px;text-transform:uppercase;color:var(--muted);}
  th.sortable{cursor:pointer;user-select:none;}
  th.sortable:hover{color:var(--navy);}
  th.sortable .arrow{display:inline-block;width:10px;font-size:9px;opacity:.4;}
  th.sortable.active .arrow{opacity:1;color:var(--navy);}
  .small{font-size:12px;color:var(--muted);}
  .toolbar{display:flex;gap:10px;margin-bottom:10px;}
  .toolbar input{width:280px;}
  .actions-cell button{padding:4px 9px;font-size:11px;}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  #printOnlyArea{display:none;}
  #printOnlyArea table{width:100%;border-collapse:collapse;font-size:11px;font-family:Inter,Arial,sans-serif;}
  #printOnlyArea th,#printOnlyArea td{border:1px solid #ccc;padding:6px 8px;text-align:left;color:#172a3a;text-decoration:none;}
  #printOnlyArea a{color:inherit;text-decoration:none;}
  #printOnlyArea tr:nth-child(even) td{background:#f7f9fb;}
  #printOnlyArea th{background:#0f2a47;color:#fff;text-transform:uppercase;font-size:9.5px;letter-spacing:.3px;}
  #printOnlyArea h1{font-size:17px;color:#0f2a47;margin:0 0 4px;font-family:Inter,Arial,sans-serif;}
  #printOnlyArea .print-meta{font-size:11px;color:#5f7385;margin:0 0 14px;font-family:Inter,Arial,sans-serif;}
  @media print{
    /* display:none actually removes these from layout (unlike
       visibility:hidden, which still reserves their full height) --
       that's what was causing dozens of blank pages after the real
       content: the full admin page underneath was still "there",
       just invisible. */
    body > *:not(#printOnlyArea){display:none !important;}
    #printOnlyArea{display:block !important;}
    #printOnlyArea table{font-size:10px;}
    #printOnlyArea tr{page-break-inside:avoid;}
  }
  .print-check{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;text-transform:none;color:var(--ink);}
  .print-check input{width:auto;}
</style>
</head>
<body>
<script src="/nav.js"></script>
<div class="wrap">
  <div class="masthead">
    <div>
      <h1>Catalog</h1>
      <p>Instruments, material types, and items used by the shipment form dropdowns.</p>
    </div>
  </div>

  <div class="card">
    <h2 id="formTitle">Add new item</h2>
    <input type="hidden" id="editId">
    <div class="grid cols-5">
      <div><label>Instrument</label><input id="f_analyzer" list="instrument-list" placeholder="e.g. Beckman Coulter DxC 700 AU"></div>
      <div><label>Material type</label><input id="f_category" list="category-list" placeholder="e.g. Reagent"></div>
      <div><label>Item</label><input id="f_item" placeholder="e.g. Albumin"></div>
      <div><label>Manufacturer name</label><input id="f_manufacturer_name" placeholder="e.g. Beckman Coulter"></div>
      <div><label>Manufacturer ref #</label><input id="f_manufacturer_ref" placeholder="e.g. OSR6102"></div>
      <div><label>McKesson ref #</label><input id="f_mckesson_ref" placeholder="optional"></div>
      <div><label>McKesson product link</label><input id="f_mckesson_url" placeholder="optional -- auto-generated from ref # if left blank"></div>
      <div><label>Pack/unit size</label><input id="f_pack_size" placeholder="e.g. 1000/BG, 6BG/BX"></div>
      <div><label>Storage temp</label><input id="f_storage_temperature" placeholder="e.g. 2-8&deg;C (Refrigerated)"></div>
      <div><label>Storage location</label><input id="f_storage_location" placeholder="e.g. Clinical Fridge 3, or 'A (note); B (note)' for dual-location" title="Plain single location: e.g. &quot;Clinical Fridge 3&quot;.&#10;&#10;For an item that moves between two locations (e.g. frozen until opened, then refrigerated), use the format &quot;Location A (note); Location B (note)&quot; -- e.g. &quot;Clinical Freezer 1 (frozen, upon receipt); Clinical Fridge 2 (once opened)&quot;.&#10;&#10;The Reference Sheets page parses exactly this format (semicolon-separated, each location followed by a parenthetical note) to list the item under both locations, in its own section, with the correct note shown for whichever location's sheet you're viewing. A typo in the punctuation will make it silently fall back to a single combined location instead."></div>
      <div><label>Vendor</label><input id="f_vendor" list="vendor-list" placeholder="e.g. McKesson"></div>
    </div>
    <datalist id="instrument-list"></datalist>
    <datalist id="category-list"></datalist>
    <datalist id="vendor-list"></datalist>
    <div class="row-actions">
      <button onclick="save()">Save</button>
      <button class="secondary" onclick="resetForm()">Clear / new entry</button>
    </div>
    <p class="small" id="formStatus" style="margin-top:8px;"></p>
  </div>

  <div class="card">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Filter by instrument, material type, item, or reference #...">
      <button type="button" class="secondary" onclick="togglePrintPanel()">Print / Export</button>
    </div>
    <div class="card" id="printPanel" style="display:none;background:#fafbfc;margin-bottom:14px;">
      <h2 style="font-size:13px;">Choose columns to include</h2>
      <p class="small" style="margin-top:-6px;margin-bottom:10px;">Uses whatever's currently typed in the search box above and the current sort order. Item is always included.</p>
      <div id="printColumnChecks" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;"></div>
      <button type="button" onclick="printSelectedColumns()">Generate Printable View</button>
      <button type="button" class="secondary" onclick="togglePrintPanel()">Cancel</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr id="tableHead"></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="printOnlyArea"></div>

<script>
var allRows = [];
var sortColumn = 'analyzer';
var sortDirection = 'asc'; // 'asc' or 'desc'

var SORT_COLUMNS = [
  { key: 'analyzer', label: 'Instrument' },
  { key: 'category', label: 'Material type' },
  { key: 'item', label: 'Item' },
  { key: 'manufacturer_name', label: 'Mfr name' },
  { key: 'manufacturer_ref', label: 'Mfr ref #' },
  { key: 'mckesson_ref', label: 'McKesson ref #' },
  { key: 'pack_size', label: 'Pack/unit size' },
  { key: 'storage_temperature', label: 'Storage Temp' },
  { key: 'storage_location', label: 'Storage Location' },
  { key: 'vendor', label: 'Vendor' }
];

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

function renderHead(){
  const head = document.getElementById('tableHead');
  head.innerHTML = SORT_COLUMNS.map(function(c){
    const isActive = sortColumn === c.key;
    const arrow = isActive ? (sortDirection === 'asc' ? '\u25B2' : '\u25BC') : '\u25B2';
    return '<th class="sortable' + (isActive ? ' active' : '') + '" data-col="' + c.key + '">' +
      escapeHtml(c.label) + ' <span class="arrow">' + arrow + '</span></th>';
  }).join('') + '<th>Actions</th>';

  head.querySelectorAll('th.sortable').forEach(function(th){
    th.addEventListener('click', function(){
      const col = th.getAttribute('data-col');
      if(sortColumn === col){
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortColumn = col;
        sortDirection = 'asc';
      }
      render();
    });
  });
}

var TIE_BREAK_COLUMNS = ['analyzer', 'category', 'item'];

function compareValues(a, b, col, dir){
  const av = (a[col] == null || a[col] === '') ? null : String(a[col]).toLowerCase();
  const bv = (b[col] == null || b[col] === '') ? null : String(b[col]).toLowerCase();
  // Rows missing this value sort to the bottom regardless of direction.
  if(av === null && bv === null) return 0;
  if(av === null) return 1;
  if(bv === null) return -1;
  if(av < bv) return -1 * dir;
  if(av > bv) return 1 * dir;
  return 0;
}

function sortRows(rows){
  const primaryCol = sortColumn;
  const primaryDir = sortDirection === 'asc' ? 1 : -1;
  // Tie-break chain always runs Instrument -> Material type -> Item (ascending),
  // skipping the primary column since it's already been compared.
  const tieBreakCols = TIE_BREAK_COLUMNS.filter(function(c){ return c !== primaryCol; });

  return rows.slice().sort(function(a, b){
    const primary = compareValues(a, b, primaryCol, primaryDir);
    if(primary !== 0) return primary;
    for(var i = 0; i < tieBreakCols.length; i++){
      const tie = compareValues(a, b, tieBreakCols[i], 1);
      if(tie !== 0) return tie;
    }
    return 0;
  });
}

function render(){
  renderHead();
  const filterText = document.getElementById('search').value.trim().toLowerCase();
  const filtered = allRows.filter(function(r){
    if(!filterText) return true;
    const haystack = (r.analyzer + ' ' + r.category + ' ' + r.item + ' ' + (r.manufacturer_name||'') + ' ' + (r.manufacturer_ref||'') + ' ' + (r.mckesson_ref||'') + ' ' + (r.pack_size||'') + ' ' + (r.storage_temperature||'') + ' ' + (r.storage_location||'') + ' ' + (r.vendor||'')).toLowerCase();
    return haystack.indexOf(filterText) !== -1;
  });
  const sorted = sortRows(filtered);

  document.getElementById('rows').innerHTML = sorted.map(function(r){
    return '<tr>' +
      '<td>' + escapeHtml(r.analyzer) + '</td>' +
      '<td>' + escapeHtml(r.category) + '</td>' +
      '<td>' + escapeHtml(r.item) + '</td>' +
      '<td class="small">' + escapeHtml(r.manufacturer_name||'--') + '</td>' +
      '<td class="small">' + escapeHtml(r.manufacturer_ref||'--') + '</td>' +
      '<td class="small">' + escapeHtml(r.mckesson_ref||'--') + '</td>' +
      '<td class="small">' + escapeHtml(r.pack_size||'--') + '</td>' +
      '<td class="small">' + escapeHtml(r.storage_temperature||'--') + '</td>' +
      '<td class="small">' + escapeHtml(r.storage_location||'--') + '</td>' +
      '<td class="small">' + escapeHtml(r.vendor||'--') + '</td>' +
      '<td class="actions-cell">' +
        '<button class="secondary" onclick="editRow(' + r.id + ')">Edit</button> ' +
        '<button class="danger" onclick="deleteRow(' + r.id + ')">Delete</button>' +
      '</td>' +
    '</tr>';
  }).join('');

  // Keep the autocomplete lists fresh
  const instruments = [...new Set(allRows.map(function(r){ return r.analyzer; }))].sort();
  const categories = [...new Set(allRows.map(function(r){ return r.category; }))].sort();
  const vendors = [...new Set(allRows.map(function(r){ return r.vendor; }).filter(Boolean))].sort();
  document.getElementById('instrument-list').innerHTML = instruments.map(function(i){ return '<option value="'+escapeHtml(i)+'">'; }).join('');
  document.getElementById('category-list').innerHTML = categories.map(function(c){ return '<option value="'+escapeHtml(c)+'">'; }).join('');
  document.getElementById('vendor-list').innerHTML = vendors.map(function(v){ return '<option value="'+escapeHtml(v)+'">'; }).join('');
}

function load(){
  fetch('/api/catalog').then(function(r){ return r.json(); }).then(function(data){
    allRows = data;
    render();
    populatePrintColumnChecks();
  });
}

// Defaults to the columns asked for most often (Mfr ref#, Storage Temp,
// Storage Location) -- everything else starts unchecked but is still
// available to add. Item is always included and isn't shown as a
// checkbox at all, same as it's always the anchor column in the table.
var DEFAULT_PRINT_COLUMNS = ['manufacturer_ref', 'storage_temperature', 'storage_location'];

function populatePrintColumnChecks(){
  const container = document.getElementById('printColumnChecks');
  if(container.children.length) return; // only build this once
  container.innerHTML = SORT_COLUMNS.filter(function(c){ return c.key !== 'item'; }).map(function(c){
    const checked = DEFAULT_PRINT_COLUMNS.indexOf(c.key) !== -1 ? ' checked' : '';
    return '<label class="print-check"><input type="checkbox" value="' + c.key + '"' + checked + '> ' + escapeHtml(c.label) + '</label>';
  }).join('');
}

function togglePrintPanel(){
  const panel = document.getElementById('printPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function printSelectedColumns(){
  const checkedCols = Array.prototype.slice.call(document.querySelectorAll('#printColumnChecks input:checked')).map(function(cb){ return cb.value; });
  const colDefs = SORT_COLUMNS.filter(function(c){ return c.key === 'item' || checkedCols.indexOf(c.key) !== -1; });

  // Same filter + sort the on-screen table is already using, so the
  // printout always matches whatever you were just looking at.
  const filterText = document.getElementById('search').value.trim().toLowerCase();
  const filtered = allRows.filter(function(r){
    if(!filterText) return true;
    const haystack = (r.analyzer + ' ' + r.category + ' ' + r.item + ' ' + (r.manufacturer_name||'') + ' ' + (r.manufacturer_ref||'') + ' ' + (r.mckesson_ref||'') + ' ' + (r.pack_size||'') + ' ' + (r.storage_temperature||'') + ' ' + (r.storage_location||'') + ' ' + (r.vendor||'')).toLowerCase();
    return haystack.indexOf(filterText) !== -1;
  });
  const sorted = sortRows(filtered);

  const headHtml = colDefs.map(function(c){ return '<th>' + escapeHtml(c.label) + '</th>'; }).join('');
  const bodyHtml = sorted.map(function(r){
    return '<tr>' + colDefs.map(function(c){ return '<td>' + escapeHtml(r[c.key] || '--') + '</td>'; }).join('') + '</tr>';
  }).join('');

  document.getElementById('printOnlyArea').innerHTML =
    '<h1>Altru Diagnostics &mdash; Catalog</h1>' +
    '<p class="print-meta">Generated ' + new Date().toLocaleString() + ' &middot; ' + sorted.length + ' item' + (sorted.length === 1 ? '' : 's') +
      (filterText ? (' &middot; filtered by &ldquo;' + escapeHtml(filterText) + '&rdquo;') : '') + '</p>' +
    '<table><thead><tr>' + headHtml + '</tr></thead><tbody>' + bodyHtml + '</tbody></table>';

  window.print();
}

function resetForm(){
  document.getElementById('editId').value = '';
  document.getElementById('formTitle').textContent = 'Add new item';
  ['f_analyzer','f_category','f_item','f_manufacturer_name','f_manufacturer_ref','f_mckesson_ref','f_mckesson_url','f_pack_size','f_storage_temperature','f_storage_location','f_vendor'].forEach(function(id){
    document.getElementById(id).value = '';
  });
  document.getElementById('formStatus').textContent = '';
}

function editRow(id){
  const r = allRows.find(function(x){ return x.id === id; });
  if(!r) return;
  document.getElementById('editId').value = r.id;
  document.getElementById('formTitle').textContent = 'Edit: ' + r.item;
  document.getElementById('f_analyzer').value = r.analyzer;
  document.getElementById('f_category').value = r.category;
  document.getElementById('f_item').value = r.item;
  document.getElementById('f_manufacturer_name').value = r.manufacturer_name || '';
  document.getElementById('f_manufacturer_ref').value = r.manufacturer_ref || '';
  document.getElementById('f_mckesson_ref').value = r.mckesson_ref || '';
  document.getElementById('f_mckesson_url').value = r.mckesson_url || '';
  document.getElementById('f_pack_size').value = r.pack_size || '';
  document.getElementById('f_storage_temperature').value = r.storage_temperature || '';
  document.getElementById('f_storage_location').value = r.storage_location || '';
  document.getElementById('f_vendor').value = r.vendor || '';
  window.scrollTo(0,0);
}

function save(){
  const statusEl = document.getElementById('formStatus');
  const id = document.getElementById('editId').value;
  const body = {
    id: id || undefined,
    analyzer: document.getElementById('f_analyzer').value,
    category: document.getElementById('f_category').value,
    item: document.getElementById('f_item').value,
    manufacturer_name: document.getElementById('f_manufacturer_name').value,
    manufacturer_ref: document.getElementById('f_manufacturer_ref').value,
    mckesson_ref: document.getElementById('f_mckesson_ref').value,
    mckesson_url: document.getElementById('f_mckesson_url').value,
    pack_size: document.getElementById('f_pack_size').value,
    storage_temperature: document.getElementById('f_storage_temperature').value,
    storage_location: document.getElementById('f_storage_location').value,
    vendor: document.getElementById('f_vendor').value
  };
  statusEl.textContent = 'Saving...';
  fetch('/api/catalog', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    if(res.error){ statusEl.textContent = 'Error: ' + res.error; return; }
    statusEl.textContent = 'Saved.';
    resetForm();
    load();
  })
  .catch(function(err){ statusEl.textContent = 'Error: ' + err.message; });
}

function deleteRow(id){
  if(!confirm('Delete this catalog item? This cannot be undone.')) return;
  fetch('/api/catalog?id=' + id, { method: 'DELETE' })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res.error){ alert('Error: ' + res.error); return; }
      load();
    });
}

document.getElementById('search').addEventListener('input', render);
load();
</script>
</body>
</html>
