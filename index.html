<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Shipment Log</title>
<style>
  :root{--navy:#0f2a47;--bg:#f4f6f8;--line:#dbe2e8;--ink:#172a3a;--muted:#5f7385;--good:#1b7a4d;--good-bg:#e7f5ee;--bad:#b3261e;--bad-bg:#fcebea;--neutral-bg:#eef2f6;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,Arial,sans-serif;color:var(--ink);}
  .wrap{max-width:480px;margin:0 auto;padding:18px;}
  .masthead{background:var(--navy);color:#fff;border-radius:10px;padding:18px;margin-bottom:16px;}
  .masthead h1{margin:0 0 4px;font-size:18px;}
  .masthead p{margin:0;font-size:12.5px;color:#c9d8e6;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;}
  label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin:12px 0 4px;}
  input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:6px;font-size:15px;font-family:inherit;background:#fff;}
  select:disabled{background:var(--neutral-bg);color:var(--muted);}
  button{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;margin-top:16px;cursor:pointer;}
  button:disabled{opacity:.6;}
  .result{margin-top:14px;padding:12px;border-radius:8px;font-size:14px;font-weight:600;display:none;}
  .result.show{display:block;}
  .result.new{background:var(--bad-bg);color:var(--bad);}
  .result.same{background:var(--good-bg);color:var(--good);}
  .result.info{background:var(--neutral-bg);color:var(--ink);}
  a.cta{display:inline-block;margin-top:8px;color:inherit;text-decoration:underline;font-size:13px;}
  .ref-tag{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .footer-link{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;}
  .footer-link a{color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>New Shipment Log</h1>
    <p>Log every reagent / calibrator / supply shipment as it arrives. New lots on reagents and calibrators are flagged automatically.</p>
  </div>
  <div class="card">
    <label>Instrument</label>
    <select id="instrument" onchange="onInstrumentChange()">
      <option value="">-- choose an instrument --</option>
    </select>

    <label>Item</label>
    <select id="item" disabled onchange="onItemChange()">
      <option value="">-- choose an instrument first --</option>
    </select>
    <p class="ref-tag" id="refTag"></p>

    <label>Lot number received</label>
    <input id="lotNumber" placeholder="e.g. 4815162342">

    <label>Expiration date</label>
    <input id="expirationDate" type="date">

    <label>Received by</label>
    <input id="receivedBy" placeholder="Your name">

    <label>Comments</label>
    <textarea id="comments" rows="2" placeholder="optional"></textarea>

    <button id="submitBtn" onclick="submitForm()">Log shipment</button>
    <div class="result" id="result"></div>
  </div>
  <p class="footer-link"><a href="/browse.html">Browse data &amp; review pending verifications &rarr;</a></p>
</div>

<script>
  var itemsForCurrentInstrument = [];

  fetch('/api/instruments').then(function(r){ return r.json(); }).then(function(list){
    var sel = document.getElementById('instrument');
    list.forEach(function(i){
      var opt = document.createElement('option');
      opt.value = i; opt.textContent = i;
      sel.appendChild(opt);
    });
  }).catch(function(err){
    document.getElementById('result').className = 'result show new';
    document.getElementById('result').innerHTML = 'Could not load instruments: ' + err.message;
  });

  function onInstrumentChange(){
    var instrument = document.getElementById('instrument').value;
    var itemSel = document.getElementById('item');
    itemSel.innerHTML = '';
    itemSel.disabled = true;
    document.getElementById('refTag').textContent = '';
    if(!instrument){
      itemSel.innerHTML = '<option value="">-- choose an instrument first --</option>';
      return;
    }
    itemSel.innerHTML = '<option value="">Loading...</option>';
    fetch('/api/items?instrument=' + encodeURIComponent(instrument))
      .then(function(r){ return r.json(); })
      .then(function(items){
        itemsForCurrentInstrument = items;
        itemSel.innerHTML = '<option value="">-- choose an item --</option>';
        var currentGroup = null, group = null;
        items.forEach(function(it, idx){
          if(it.category !== currentGroup){
            currentGroup = it.category;
            group = document.createElement('optgroup');
            group.label = currentGroup;
            itemSel.appendChild(group);
          }
          var opt = document.createElement('option');
          opt.value = String(idx);
          opt.textContent = it.item;
          group.appendChild(opt);
        });
        itemSel.disabled = false;
      })
      .catch(function(err){
        itemSel.innerHTML = '<option value="">-- error loading items --</option>';
        document.getElementById('refTag').textContent = 'Error: ' + err.message;
      });
  }

  function onItemChange(){
    var idx = document.getElementById('item').value;
    var refTag = document.getElementById('refTag');
    if(idx === '' || !itemsForCurrentInstrument[idx]){
      refTag.textContent = '';
      return;
    }
    var it = itemsForCurrentInstrument[idx];
    refTag.textContent = 'Reference #: ' + (it.reference_number || '--') + '  \u00b7  Category: ' + it.category;
  }

  function submitForm(){
    var btn = document.getElementById('submitBtn');
    var resultEl = document.getElementById('result');
    var instrument = document.getElementById('instrument').value;
    var idx = document.getElementById('item').value;

    if(!instrument || idx === '' || !itemsForCurrentInstrument[idx]){
      resultEl.className = 'result show new';
      resultEl.innerHTML = 'Please choose an instrument and an item.';
      return;
    }
    var it = itemsForCurrentInstrument[idx];
    var payload = {
      instrument: instrument,
      category: it.category,
      item: it.item,
      ref: it.reference_number,
      lotNumber: document.getElementById('lotNumber').value,
      expirationDate: document.getElementById('expirationDate').value,
      receivedBy: document.getElementById('receivedBy').value,
      comments: document.getElementById('comments').value
    };
    if(!payload.lotNumber){
      resultEl.className = 'result show new';
      resultEl.innerHTML = 'Please enter the lot number.';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Logging...';
    fetch('/api/log-shipment', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    })
    .then(function(r){ return r.json(); })
    .then(function(res){
      btn.disabled = false;
      btn.textContent = 'Log shipment';
      if(res.error){
        resultEl.className = 'result show new';
        resultEl.innerHTML = 'Error: ' + res.error;
        return;
      }
      var cls = res.isNewLot ? (res.flaggable ? 'new' : 'info') : 'same';
      resultEl.className = 'result show ' + cls;
      var msg;
      if(res.isNewLot && res.flaggable){
        msg = 'NEW LOT DETECTED &mdash; flagged for lot-to-lot verification. Previous lot on file: ' + res.previousLot;
      } else if(res.isNewLot){
        msg = "New lot logged. This category doesn't require a lot-to-lot comparison, but it's on record. Previous lot: " + res.previousLot;
      } else {
        msg = 'Same lot as on file &mdash; logged as a routine restock.';
      }
      if(res.comparisonUrl){
        msg += '<br><a class="cta" href="' + res.comparisonUrl + '" target="_blank">Start verification in the comparison tool &rarr;</a>';
      }
      resultEl.innerHTML = msg;
      document.getElementById('lotNumber').value = '';
      document.getElementById('comments').value = '';
    })
    .catch(function(err){
      btn.disabled = false;
      btn.textContent = 'Log shipment';
      resultEl.className = 'result show new';
      resultEl.innerHTML = 'Error: ' + err.message;
    });
  }
</script>
</body>
</html>
