<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lot Tracking - Reference Sheets</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{--navy:#0f2a47;--navy-light:#1c3f63;--bg:#f4f6f8;--card:#ffffff;--line:#dbe2e8;--ink:#172a3a;--muted:#5f7385;--bad:#b3261e;--neutral-bg:#eef2f6;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,Arial,sans-serif;color:var(--ink);font-size:14px;}
  .wrap{max-width:1000px;margin:0 auto;padding:18px;}
  .masthead{background:var(--navy);color:#fff;border-radius:10px;padding:18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .masthead h1{margin:0 0 4px;font-size:18px;}
  .masthead p{margin:0;font-size:12.5px;color:#c9d8e6;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;}
  .card h2{margin:0 0 12px;font-size:15px;color:var(--navy);}
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
  select{width:100%;max-width:420px;padding:9px 10px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;}
  button{padding:10px 18px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-top:14px;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .small{font-size:12px;color:var(--muted);}
  #status{margin-top:10px;font-size:12.5px;color:var(--muted);}
  #status.error{color:var(--bad);}
</style>
</head>
<body>
<script src="/nav.js"></script>

<div class="wrap">
  <div class="masthead">
    <div>
      <h1>Reference Sheets</h1>
      <p>Generate a printable, laminate-ready PDF for any storage location -- pulled live from the catalog.</p>
    </div>
  </div>

  <div class="card">
    <h2>Choose a storage location</h2>
    <label>Storage location</label>
    <select id="locationSelect"><option value="">Loading...</option></select>
    <p class="small" id="itemCount" style="margin-top:8px;"></p>
    <button id="generateBtn" onclick="generateSheet()" disabled>Download Reference Sheet (PDF)</button>
    <p id="status"></p>
  </div>
</div>

<script>
var allRows = [];

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

/**
 * Some catalog rows have a compound storage_location, e.g.
 * "Clinical Freezer 1 (frozen, upon receipt); Clinical Fridge 2 (once opened)"
 * for items that physically live in one place until opened/thawed/aliquoted,
 * then move to another. Splits that into segments, each a real physical
 * location plus the parenthetical note describing the state it's in there.
 * A plain "Clinical Fridge 3" comes back as a single segment with no note.
 */
function parseLocationSegments(raw){
  if(!raw) return [];
  return raw.split(';').map(function(seg){
    seg = seg.trim();
    const m = seg.match(/^(.*?)\s*\(([^)]*)\)\s*$/);
    return m ? { base: m[1].trim(), note: m[2].trim() } : { base: seg, note: '' };
  }).filter(function(s){ return s.base; });
}

function loadLocations(){
  fetch('/api/catalog').then(function(r){ return r.json(); }).then(function(data){
    allRows = data;
    // The dropdown lists real physical locations only -- a compound
    // location string is never itself a place to stand in front of, so it
    // never appears as its own option; both real locations it references
    // do.
    const locationSet = new Set();
    allRows.forEach(function(r){
      parseLocationSegments(r.storage_location).forEach(function(s){ locationSet.add(s.base); });
    });
    const locations = [...locationSet].sort();

    const select = document.getElementById('locationSelect');
    if(!locations.length){
      select.innerHTML = '<option value="">No storage locations found in catalog</option>';
      return;
    }
    select.innerHTML = locations.map(function(loc){
      return '<option value="' + escapeHtml(loc) + '">' + escapeHtml(loc) + '</option>';
    }).join('');
    document.getElementById('generateBtn').disabled = false;
    updateItemCount();
  }).catch(function(err){
    document.getElementById('locationSelect').innerHTML = '<option value="">Failed to load catalog</option>';
    showStatus('Could not load catalog: ' + err.message, true);
  });
}

// Matches a row if ANY of its location segments is this physical location --
// not just an exact full-string match -- so compound-location rows show up
// under both real locations they reference.
function itemsForLocation(loc){
  return allRows.filter(function(r){
    return parseLocationSegments(r.storage_location).some(function(s){ return s.base === loc; });
  });
}

function updateItemCount(){
  const loc = document.getElementById('locationSelect').value;
  const n = itemsForLocation(loc).length;
  document.getElementById('itemCount').textContent = loc ? (n + ' item' + (n === 1 ? '' : 's') + ' at this location') : '';
}

function showStatus(msg, isError){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

/**
 * Builds the PDF with jsPDF + autoTable -- drawing real vector text
 * directly into the PDF, NOT screenshotting a live HTML/DOM element.
 *
 * This matters for two reasons learned the hard way elsewhere in this app:
 *   1. html2canvas captures whatever the browser/OS has already done to
 *      the DOM, including "smart text" link-style auto-detection on
 *      code-like strings (reference numbers) -- shows up as random blue
 *      underlined cells with no link anywhere in the markup. Drawing text
 *      directly into the PDF sidesteps the DOM (and that quirk) entirely.
 *   2. autoTable owns line-height/wrapping/row-height math itself, so
 *      wrapped multi-line cells (e.g. long "DO NOT FREEZE" temp text)
 *      can't visually collide the way they did when relying on a
 *      browser's own text reflow inside a screenshot.
 */
function generateSheet(){

  const loc = document.getElementById('locationSelect').value;
  if(!loc){
    showStatus('Choose a storage location first.', true);
    return;
  }
  const rawRows = itemsForLocation(loc);
  if(!rawRows.length){
    showStatus('No catalog items are assigned to this storage location.', true);
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  showStatus('Generating PDF...');

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });
    const PAGE_W = 612, PAGE_H = 792, MARGIN = 36;

    const items = rawRows.map(function(r){
      const segs = parseLocationSegments(r.storage_location);
      const thisSeg = segs.find(function(s){ return s.base === loc; }) || { base: loc, note: '' };
      const otherSegs = segs.filter(function(s){ return s !== thisSeg; });
      return {
        label: r.item,
        materialType: r.category || '--',
        ref: r.manufacturer_ref || '--',
        temp: r.storage_temperature || '--',
        warn: /DO NOT FREEZE/i.test(r.storage_temperature || ''),
        // Items stored frozen long-term but stable at refrigerator temp for
        // a window once thawed (e.g. BNP/hLH calibrators in Clinical
        // Freezer 2) -- pulled into their own section below the main list.
        // Only applies to single-location items; a compound-location item's
        // lifecycle is already captured by the dual-location section below.
        thaw: segs.length === 1 && /thaw/i.test(r.storage_temperature || ''),
        isCompound: segs.length > 1,
        thisNote: thisSeg.note,
        otherBase: otherSegs.map(function(s){ return s.base; }).join(' / ')
      };
    }).sort(function(a, b){
      const byType = a.materialType.localeCompare(b.materialType);
      if(byType !== 0) return byType;
      return a.label.localeCompare(b.label);
    });

    const regularItems = items.filter(function(it){ return !it.isCompound && !it.thaw; });
    const thawItems = items.filter(function(it){ return !it.isCompound && it.thaw; });
    const dualItems = items.filter(function(it){ return it.isCompound; });

    function toRow(it){
      const label = it.label + (it.isCompound && it.thisNote ? ' (' + it.thisNote + ')' : '');
      return [label, it.materialType, it.ref, it.temp];
    }

    const bodyRows = regularItems.map(toRow);

    if(thawItems.length){
      bodyRows.push([{
        content: 'ONCE THAWED \u2014 STABLE AT REFRIGERATOR TEMP (SEE TEMP COLUMN FOR WINDOW)',
        colSpan: 4,
        styles: { fillColor: [255, 243, 205], textColor: [120, 90, 10], fontStyle: 'bold', halign: 'center', fontSize: 8.5 }
      }]);
      thawItems.forEach(function(it){ bodyRows.push(toRow(it)); });
    }

    if(dualItems.length){
      // Grouped by the OTHER physical location, since multiple compound
      // pairs can land on the same sheet (e.g. Clinical Fridge 2 also gets
      // items shared with both Clinical Freezer 1 and Clinical Freezer 2).
      const groups = {};
      dualItems.forEach(function(it){
        (groups[it.otherBase] = groups[it.otherBase] || []).push(it);
      });
      Object.keys(groups).sort().forEach(function(otherBase){
        bodyRows.push([{
          content: 'ALSO STORED IN ' + otherBase.toUpperCase() + ' \u2014 SEE NOTE PER ITEM FOR WHICH STATE APPLIES HERE',
          colSpan: 4,
          styles: { fillColor: [219, 234, 254], textColor: [30, 64, 130], fontStyle: 'bold', halign: 'center', fontSize: 8.5 }
        }]);
        groups[otherBase].forEach(function(it){ bodyRows.push(toRow(it)); });
      });
    }

    const generatedStr = new Date().toLocaleString();

    // Header subtitle wraps within the space left of the CLIA/Director meta
    // block (reserved ~190pt on the right) instead of running into it when
    // storage_location is long.
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10.5);
    const subtitleText = loc + ' \u2014 Reagent & Calibrator Reference';
    const subtitleLines = doc.splitTextToSize(subtitleText, PAGE_W - MARGIN - 190 - MARGIN);
    const SUBTITLE_LINE_H = 13;
    const HEADER_H = 38 + subtitleLines.length * SUBTITLE_LINE_H;

    // Footer wraps to full page width and the page number sits on its own
    // row below it -- stacked vertically so a long location name can never
    // collide horizontally with "Page N", no matter how many lines it takes.
    doc.setFontSize(7.5);
    const footerText = 'Post on ' + loc + ' door \u00b7 Verify against catalog before discarding/replacing \u00b7 Generated ' + generatedStr;
    const footerLines = doc.splitTextToSize(footerText, PAGE_W - 2 * MARGIN);
    const FOOTER_LINE_H = 9;
    const FOOTER_PAGENUM_GAP = 12;
    const BOTTOM_MARGIN = 22 + FOOTER_PAGENUM_GAP + footerLines.length * FOOTER_LINE_H;

    function drawChrome(data){
      // Navy header band, redrawn identically on every page.
      doc.setFillColor(15, 42, 71);
      doc.rect(0, 0, PAGE_W, HEADER_H, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(17);
      doc.text('ALTRU DIAGNOSTICS', MARGIN, 30);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10.5);
      doc.setTextColor(207, 224, 240);
      subtitleLines.forEach(function(line, i){
        doc.text(line, MARGIN, 48 + i * SUBTITLE_LINE_H);
      });
      doc.setFontSize(8);
      doc.text('CLIA #45D2128678', PAGE_W - MARGIN, 26, { align: 'right' });
      doc.text('Lab Director: J. Stein, PhD, HCLD(ABB)', PAGE_W - MARGIN, 38, { align: 'right' });

      // Footer text block, then page number on its own row beneath it.
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.setTextColor(95, 115, 133);
      const pageNumY = PAGE_H - 14;
      const footerLastLineY = pageNumY - FOOTER_PAGENUM_GAP;
      footerLines.forEach(function(line, i){
        const y = footerLastLineY - (footerLines.length - 1 - i) * FOOTER_LINE_H;
        doc.text(line, PAGE_W / 2, y, { align: 'center' });
      });
      doc.text('Page ' + data.pageNumber, PAGE_W - MARGIN, pageNumY, { align: 'right' });
    }

    doc.autoTable({
      startY: HEADER_H + 18,
      margin: { left: MARGIN, right: MARGIN, top: HEADER_H + 18, bottom: BOTTOM_MARGIN },
      head: [['Item', 'Material Type', 'Ref #', 'Temp']],
      body: bodyRows,
      styles: { font: 'helvetica', fontSize: 9, cellPadding: 5, valign: 'middle', lineColor: [213, 221, 229], lineWidth: 0.5 },
      headStyles: { fillColor: [28, 63, 99], textColor: 255, fontStyle: 'bold', fontSize: 9 },
      alternateRowStyles: { fillColor: [238, 242, 246] },
      columnStyles: {
        0: { cellWidth: 195 },
        1: { cellWidth: 95 },
        2: { cellWidth: 120 },
        3: { cellWidth: 'auto' }
      },
      didParseCell: function(data){
        if(data.section === 'body' && data.column.index === 3){
          if(/DO NOT FREEZE/i.test(String(data.cell.raw || ''))){
            data.cell.styles.textColor = [179, 38, 30];
            data.cell.styles.fontStyle = 'bold';
          }
        }
      },
      didDrawPage: drawChrome
    });

    const filename = ('ALTRU_' + loc + '_Reference_' + new Date().toISOString().slice(0, 10))
      .replace(/[^a-zA-Z0-9_\-]+/g, '_') + '.pdf';

    const blob = doc.output('blob');
    if(!blob || blob.size < 2000){
      throw new Error('Generated PDF looks empty (' + (blob ? blob.size : 0) + ' bytes). Try again.');
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    showStatus('Downloaded ' + filename + ' (' + items.length + ' items, ' + doc.internal.getNumberOfPages() + ' page' + (doc.internal.getNumberOfPages() === 1 ? '' : 's') + ')');
  } catch(err){
    showStatus('PDF generation failed: ' + err.message, true);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('locationSelect').addEventListener('change', updateItemCount);
loadLocations();
</script>
</body>
</html>
