<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lot Tracking - Reference Sheets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<style>
  :root{--navy:#0f2a47;--navy-light:#1c3f63;--bg:#f4f6f8;--card:#ffffff;--line:#dbe2e8;--ink:#172a3a;--muted:#5f7385;--bad:#b3261e;--neutral-bg:#eef2f6;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,Arial,sans-serif;color:var(--ink);font-size:14px;}
  .wrap{max-width:1000px;margin:0 auto;padding:18px;}
  .masthead{background:var(--navy);color:#fff;border-radius:10px;padding:18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .masthead h1{margin:0 0 4px;font-size:18px;}
  .masthead p{margin:0;font-size:12.5px;color:#c9d8e6;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;}
  .card h2{margin:0 0 12px;font-size:15px;color:var(--navy);}
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
  select{width:100%;max-width:420px;padding:9px 10px;border:1px solid var(--line);border-radius:6px;font-size:13.5px;font-family:inherit;}
  button{padding:10px 18px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-top:14px;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .small{font-size:12px;color:var(--muted);}
  #status{margin-top:10px;font-size:12.5px;color:var(--muted);}
  #status.error{color:var(--bad);}
  /* Render target for html2pdf -- kept in normal document flow (NOT
     position:absolute/off-screen: html2canvas can't capture elements
     positioned outside the page bounds, which previously caused blank
     PDFs elsewhere in this app). It's empty except for the brief window
     during generateSheet(), so there's nothing to see most of the time;
     window.scrollTo(0,0) below also scrolls away from the brief flash. */
  #pdf-render-target{width:1040px;background:#fff;}
  .sheet-header{background:var(--navy);color:#fff;padding:20px 26px;display:flex;justify-content:space-between;align-items:flex-start;border-radius:8px 8px 0 0;}
  .sheet-header h1{margin:0 0 6px;font-size:24px;letter-spacing:.3px;}
  .sheet-header .sub{margin:0;font-size:14px;color:#cfe0f0;}
  .sheet-header .meta{text-align:right;font-size:10.5px;color:#cfe0f0;line-height:1.5;}
  .sheet-columns{display:flex;gap:12px;padding:14px 0 0;}
  .sheet-col{flex:1;min-width:0;}
  .sheet-col table{width:100%;border-collapse:collapse;table-layout:fixed;}
  .sheet-col th{background:var(--navy-light);color:#fff;font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;text-align:left;padding:5px 6px;}
  .sheet-col th:nth-child(1){width:54%;}
  .sheet-col th:nth-child(2){width:27%;}
  .sheet-col th:nth-child(3){width:19%;}
  .sheet-col td{font-size:10px;padding:4px 6px;border-bottom:1px solid #d5dde5;vertical-align:middle;word-break:break-word;}
  .sheet-col td.ref{color:var(--muted);}
  .sheet-col tr:nth-child(even) td{background:var(--neutral-bg);}
  .sheet-col td.temp-warn{color:var(--bad);font-weight:700;}
  .sheet-footer{padding:10px 26px 16px;font-size:9px;color:var(--muted);text-align:center;}
</style>
</head>
<body>
<script src="/nav.js"></script>

<div class="wrap">
  <div class="masthead">
    <div>
      <h1>Reference Sheets</h1>
      <p>Generate a printable, laminate-ready PDF for any storage location -- pulled live from the catalog.</p>
    </div>
  </div>

  <div class="card">
    <h2>Choose a storage location</h2>
    <label>Storage location</label>
    <select id="locationSelect"><option value="">Loading...</option></select>
    <p class="small" id="itemCount" style="margin-top:8px;"></p>
    <button id="generateBtn" onclick="generateSheet()" disabled>Download Reference Sheet (PDF)</button>
    <p id="status"></p>
  </div>
</div>

<div id="pdf-render-target"></div>

<script>
var allRows = [];

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

// "Calibrator" -> "Cal", "Reagent" -> "Rgt", anything else -> first 3 letters.
// Several items (CO2, HDL, Homocysteine, LDL, LPa, LPA2, RF Latex, UALB,
// Valproic Acid, Cystatin C, etc.) exist as both a calibrator AND a reagent
// in the same fridge, so this suffix is always shown rather than only when
// a clash is detected -- consistent and never ambiguous.
function categoryAbbrev(cat){
  if(!cat) return '';
  if(cat === 'Calibrator') return 'Cal';
  if(cat === 'Reagent') return 'Rgt';
  return cat.slice(0, 3);
}

function loadLocations(){
  fetch('/api/catalog').then(function(r){ return r.json(); }).then(function(data){
    allRows = data;
    const locations = [...new Set(
      allRows.map(function(r){ return r.storage_location; }).filter(function(v){ return v && v.trim(); })
    )].sort();

    const select = document.getElementById('locationSelect');
    if(!locations.length){
      select.innerHTML = '<option value="">No storage locations found in catalog</option>';
      return;
    }
    select.innerHTML = locations.map(function(loc){
      return '<option value="' + escapeHtml(loc) + '">' + escapeHtml(loc) + '</option>';
    }).join('');
    document.getElementById('generateBtn').disabled = false;
    updateItemCount();
  }).catch(function(err){
    document.getElementById('locationSelect').innerHTML = '<option value="">Failed to load catalog</option>';
    showStatus('Could not load catalog: ' + err.message, true);
  });
}

function itemsForLocation(loc){
  return allRows.filter(function(r){ return r.storage_location === loc; });
}

function updateItemCount(){
  const loc = document.getElementById('locationSelect').value;
  const n = itemsForLocation(loc).length;
  document.getElementById('itemCount').textContent = loc ? (n + ' item' + (n === 1 ? '' : 's') + ' at this location') : '';
}

function showStatus(msg, isError){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

/**
 * Splits a sorted array into N roughly-equal column-major chunks, i.e.
 * column 1 gets the first ceil(n/N) items, column 2 the next chunk, etc.
 * -- same layout convention as a newspaper, so the sheet reads top-to-
 * bottom then left-to-right.
 */
function splitIntoColumns(items, n){
  const perCol = Math.ceil(items.length / n);
  const cols = [];
  for(let i = 0; i < n; i++) cols.push(items.slice(i * perCol, (i + 1) * perCol));
  return cols;
}

function buildSheetHtml(loc, rows){
  const items = rows.map(function(r){
    const abbr = categoryAbbrev(r.category);
    return {
      label: r.item + (abbr ? ' (' + abbr + ')' : ''),
      ref: r.manufacturer_ref || '--',
      temp: r.storage_temperature || '--',
      warn: /DO NOT FREEZE/i.test(r.storage_temperature || '')
    };
  }).sort(function(a, b){ return a.label.localeCompare(b.label); });

  const columns = splitIntoColumns(items, 3);

  const colsHtml = columns.map(function(col){
    const rowsHtml = col.map(function(it){
      return '<tr><td>' + escapeHtml(it.label) + '</td>' +
        '<td class="ref">' + escapeHtml(it.ref) + '</td>' +
        '<td class="' + (it.warn ? 'temp-warn' : '') + '">' + escapeHtml(it.temp) + '</td></tr>';
    }).join('');
    return '<div class="sheet-col"><table>' +
      '<thead><tr><th>Item</th><th>Ref #</th><th>Temp</th></tr></thead>' +
      '<tbody>' + rowsHtml + '</tbody></table></div>';
  }).join('');

  const generated = new Date().toLocaleString();

  return '<div class="sheet-header">' +
    '<div><h1>ALTRU DIAGNOSTICS</h1><p class="sub">' + escapeHtml(loc) + ' &mdash; Reagent &amp; Calibrator Reference</p></div>' +
    '<div class="meta">CLIA #45D2128678<br>Lab Director: J. Stein, PhD, HCLD(ABB)</div>' +
    '</div>' +
    '<div class="sheet-columns">' + colsHtml + '</div>' +
    '<div class="sheet-footer">Post on ' + escapeHtml(loc) + ' door &middot; Verify against catalog before discarding/replacing &middot; Generated ' + generated + ' from LotToLot</div>';
}

function generateSheet(){
  const loc = document.getElementById('locationSelect').value;
  if(!loc){
    showStatus('Choose a storage location first.', true);
    return;
  }
  const rows = itemsForLocation(loc);
  if(!rows.length){
    showStatus('No catalog items are assigned to this storage location.', true);
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  showStatus('Generating PDF...');

  const target = document.getElementById('pdf-render-target');
  target.innerHTML = buildSheetHtml(loc, rows);

  const filename = ('ALTRU_' + loc + '_Reference_' + new Date().toISOString().slice(0, 10))
    .replace(/[^a-zA-Z0-9_\-]+/g, '_') + '.pdf';

  window.scrollTo(0, 0);

  html2pdf().set({
    margin: 18,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, scrollX: 0, scrollY: 0, windowWidth: 1040, width: 1040 },
    jsPDF: { unit: 'pt', format: 'letter', orientation: 'landscape' },
    pagebreak: { mode: ['avoid-all', 'css'] }
  }).from(target).toPdf().output('blob').then(function(pdfBlob){
    if(!pdfBlob || pdfBlob.size < 2000){
      throw new Error('Generated PDF looks empty (' + (pdfBlob ? pdfBlob.size : 0) + ' bytes). Try again.');
    }
    const url = URL.createObjectURL(pdfBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showStatus('Downloaded ' + filename);
    btn.disabled = false;
  }).catch(function(err){
    showStatus('PDF generation failed: ' + err.message, true);
    btn.disabled = false;
  }).finally(function(){
    target.innerHTML = '';
  });
}

document.getElementById('locationSelect').addEventListener('change', updateItemCount);
loadLocations();
</script>
</body>
</html>
