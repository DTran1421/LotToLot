<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lot Tracking - Browse</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script src="/report.js"></script>
<script src="/raw-data.js"></script>
<style>
  :root{--navy:#0f2a47;--navy-light:#1c3f63;--bg:#f4f6f8;--card:#ffffff;--line:#dbe2e8;--ink:#172a3a;--muted:#5f7385;--good:#1b7a4d;--good-bg:#e7f5ee;--bad:#b3261e;--bad-bg:#fcebea;--neutral-bg:#eef2f6;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,Arial,sans-serif;color:var(--ink);font-size:14px;}
  .wrap{max-width:1700px;margin:0 auto;padding:18px;}
  .masthead{background:var(--navy);color:#fff;border-radius:10px;padding:18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .masthead h1{margin:0 0 4px;font-size:18px;}
  .masthead p{margin:0;font-size:12.5px;color:#c9d8e6;}
  .masthead a{color:#cfe0f0;font-size:12px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;}
  .tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .tab{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .toolbar{display:flex;justify-content:flex-start;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap;}
  .toolbar input, .toolbar select{padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;}
  .toolbar input{width:240px;}
  .toolbar select{width:180px;}
  .count{font-size:12px;color:var(--muted);margin-left:auto;}
  .table-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{border-bottom:1px solid var(--line);padding:7px 10px;text-align:left;word-break:break-word;}
  th{font-size:10.5px;text-transform:uppercase;color:var(--muted);position:sticky;top:0;background:#fff;white-space:nowrap;word-break:normal;}
  tr:hover td{background:#f9fafb;}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
  .pill.pending{background:var(--neutral-bg);color:var(--muted);}
  .pill.review{background:#fff7e6;color:#a86c00;}
  .pill.fail{background:var(--bad-bg);color:var(--bad);}
  .pill.verified{background:var(--good-bg);color:var(--good);}
  .pill.pass{background:var(--good-bg);color:var(--good);}
  .empty{text-align:center;color:var(--muted);padding:30px 0;}
  a.pdf-link{color:var(--navy);}
  .approve-cell input{width:110px;padding:5px 7px;border:1px solid var(--line);border-radius:5px;font-size:12px;}
  .approve-cell button{padding:5px 10px;background:var(--navy);color:#fff;border:none;border-radius:5px;font-size:11.5px;font-weight:600;cursor:pointer;margin-top:4px;}
  .approve-cell button:disabled{opacity:.5;}
  .approve-msg{font-size:11px;color:var(--muted);margin-top:3px;max-width:160px;}
  .pill.resolved{background:var(--good-bg);color:var(--good);}
  .pill.dismissed{background:var(--neutral-bg);color:var(--muted);}
  .review-row{border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:10px;background:#fff;}
  .review-row-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
  .review-extracted{font-size:13px;color:var(--ink);}
  .review-extracted .small{display:block;color:var(--muted);font-size:11.5px;margin-top:2px;}
  .review-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
  .review-grid label{display:block;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
  .review-grid input,.review-grid select{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:6px;font-size:13px;}
  .review-new-item-box{border:1px dashed var(--line);border-radius:6px;padding:10px;margin-bottom:10px;background:#fafbfc;}
  .review-new-item-box .review-grid{margin-bottom:0;}
  .review-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .review-actions button{padding:8px 14px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--navy);}
  .review-actions button.primary{background:var(--navy);color:#fff;border-color:var(--navy);}
  .review-actions button.danger{color:var(--bad);border-color:#e3b3af;}
  .review-actions button:disabled{opacity:.5;cursor:default;}
  .review-msg{font-size:12px;color:var(--muted);margin-top:8px;}
  .review-msg.err{color:var(--bad);}
  .review-msg.ok{color:var(--good);}

  @media (max-width: 768px){
    .review-grid{grid-template-columns:1fr;}
  }

  @media (max-width: 768px){
    .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    table{width:auto;min-width:100%;}
    th{font-size:10px;padding:7px 8px;}
  }

  /* Report-rendering classes -- must match compare.html so the offscreen
     PDF render at approval time looks identical to the on-screen preview. */
  .report-section{margin-bottom:22px;}
  .report-section h3{color:var(--navy);font-size:14.5px;border-bottom:2px solid var(--navy);padding-bottom:4px;margin-bottom:10px;}
  .meta-table{width:100%;border-collapse:collapse;margin-bottom:10px;}
  .meta-table td{border:1px solid var(--line);padding:7px 10px;font-size:13px;}
  .meta-table td.k{color:var(--muted);width:180px;font-weight:600;background:#f6f8fa;}
  .verdict-banner{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:14px;font-weight:700;}
  .verdict-banner.pass{background:var(--good-bg);color:var(--good);}
  .verdict-banner.fail{background:var(--bad-bg);color:var(--bad);}
  .small{font-size:12px;color:var(--muted);}
  .sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:30px;}
  .stats-box{border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:14px;background:#fafbfc;}
  .report-footer{border-top:2px solid var(--line);margin-top:60px;padding-top:18px;padding-bottom:10px;}
  .sig-line{border-top:1px solid #333;margin-top:34px;padding-top:4px;font-size:11.5px;color:var(--muted);}
  #pdf-render-target{width:980px;}
</style>
</head>
<body>
<script src="/nav.js"></script>
<div class="wrap">
  <div class="masthead">
    <div>
      <h1>Lot Tracking &mdash; Browse</h1>
      <p>Catalog, Reagent Master, Receiving Log, full Lot-to-Lot History, and manifest items Needs Review. Approve pending verifications inline.</p>
    </div>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-table="reagent_master">Reagent Master</div>
      <div class="tab" data-table="lot_to_lot_reports">Lot-to-Lot History</div>
      <div class="tab" data-table="receiving_log">Receiving Log</div>
      <div class="tab" data-table="catalog">Catalog</div>
      <div class="tab" data-table="needs_review">Needs Review</div>
    </div>
    <div id="pendingBanner" onclick="showPendingOnly()" style="display:none;cursor:pointer;background:#fff3cd;border:1px solid #f0d28a;border-left:4px solid #b8860b;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:13.5px;font-weight:600;color:#7a5a0a;">
    </div>
    <div class="toolbar" id="genericToolbar">
      <input type="text" id="search" placeholder="Filter rows...">
      <select id="filterInstrument"><option value="">All instruments</option></select>
      <select id="filterItem"><option value="">All items</option></select>
      <select id="filterStatus"><option value="">All statuses</option></select>
      <div class="count" id="count"></div>
    </div>
    <div class="table-scroll" id="genericTableScroll">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none;">No rows.</div>
    </div>

    <div id="needsReviewView" style="display:none;">
      <div class="toolbar">
        <select id="reviewStatusFilter">
          <option value="pending">Pending</option>
          <option value="resolved">Resolved</option>
          <option value="dismissed">Dismissed</option>
          <option value="">All</option>
        </select>
        <div class="count" id="reviewCount"></div>
      </div>
      <div id="reviewRows"></div>
      <div class="empty" id="reviewEmpty" style="display:none;">No items match.</div>
      <datalist id="reviewInstrumentList"></datalist>
      <datalist id="reviewCategoryList">
        <option value="Reagent"><option value="Calibrator"><option value="Control">
        <option value="Chemical"><option value="Equipment"><option value="Misc"><option value="Linearity">
      </datalist>
    </div>
  </div>
</div>
<div id="pdf-render-target"></div>

<script>
var currentTable = 'reagent_master';
var currentRows = [];

var COLUMN_LABELS = {
  reagent_master: ['instrument','category','item','manufacturer_ref','mckesson_ref','current_lot','last_received_date','status','comparison_url','performed_by','report_pdf_url','verified_by','date_verified','notes'],
  lot_to_lot_reports: ['submitted_at','instrument','category','item','old_lot','new_lot','pass','status','performed_by','pdf_url','verified_by','date_verified','voided_by','voided_at','void_reason'],
  receiving_log: ['logged_at','received_by','instrument','category','item','manufacturer_ref','mckesson_ref','lot_number','quantity','expiration_date','previous_lot','is_new_lot','status','comments','source_manifest_url'],
  catalog: ['analyzer','item','category','manufacturer_name','manufacturer_ref','mckesson_ref','pack_size','storage_temperature','storage_location','vendor']
};

// Which tables get the Instrument/Item filter dropdowns + inline Approve column.
var FILTERABLE_TABLES = ['reagent_master','lot_to_lot_reports'];
var APPROVABLE_TABLES = ['reagent_master','lot_to_lot_reports'];

// Status value(s) that represent "needs action" for the prominent banner +
// quick filter, per table. reagent_master's 'Pending verification' is what
// actually means "this item needs a lot-to-lot comparison run" -- that's
// the specific thing the banner surfaces front and center, since it was
// previously buried in a status column with no dedicated way to isolate it.
var PENDING_STATUS_BY_TABLE = {
  reagent_master: ['Pending verification', 'Pending Review', 'Failed - needs investigation'],
  lot_to_lot_reports: ['Pending Review', 'Failed - needs investigation'],
};
var PENDING_BANNER_LABEL = {
  reagent_master: function(n){ return '\ud83d\udccc ' + n + ' item' + (n===1?'':'s') + ' with outstanding lot-to-lot work (needs comparison, pending approval, or failed) \u2014 click to view'; },
  lot_to_lot_reports: function(n){ return '\ud83d\udccc ' + n + ' report' + (n===1?'':'s') + ' awaiting approval or investigation \u2014 click to view'; },
};

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

// Maps every actual stored status string (across log-shipment.js,
// save-report.js, and approve.js) to a short label + pill color. The
// underlying value is untouched -- canApprove() and everything else still
// matches against the real stored text -- this is purely a condensed
// display. Full original text is still available via the title tooltip.
var STATUS_DISPLAY = {
  'N/A - initial lot on file': { label: 'Baseline', cls: 'pending' },
  'Pending verification': { label: 'Needs comparison', cls: 'review' },
  'New lot logged (no verification required for this category)': { label: 'New lot', cls: 'pending' },
  'Same lot - restock only': { label: 'Restock', cls: 'pass' },
  'Pending Review': { label: 'Awaiting approval', cls: 'review' },
  'Failed - needs investigation': { label: 'Failed', cls: 'fail' },
  'Verified': { label: 'Verified', cls: 'verified' },
  'Voided': { label: 'Voided', cls: 'dismissed' },
};

function formatCell(col, value){
  if(value === null || value === undefined || value === '') return '<span style="color:#bbb;">--</span>';
  if(col === 'status'){
    var info = STATUS_DISPLAY[value] || { label: value, cls: 'pending' };
    return '<span class="pill ' + info.cls + '" title="' + escapeHtml(value) + '">' + escapeHtml(info.label) + '</span>';
  }
  if(col === 'pass'){
    return '<span class="pill ' + (value ? 'pass' : 'fail') + '">' + (value ? 'PASS' : 'FAIL') + '</span>';
  }
  if(col === 'report_pdf_url' || col === 'pdf_url'){
    return '<a class="pdf-link" href="' + escapeHtml(value) + '" target="_blank">View PDF</a>';
  }
  if(col === 'comparison_url'){
    return '<a class="pdf-link" href="' + escapeHtml(value) + '" target="_blank">Start verification &rarr;</a>';
  }
  if(col === 'source_manifest_url'){
    return '<a class="pdf-link" href="' + escapeHtml(value) + '" target="_blank">View original</a>';
  }
  if(col === 'is_new_lot'){
    return value ? 'Yes' : 'No';
  }
  if(col === 'logged_at' || col === 'last_received_date' || col === 'date_verified' || col === 'submitted_at' || col === 'voided_at'){
    try { return new Date(value).toLocaleString(); } catch(e){ return escapeHtml(value); }
  }
  return escapeHtml(value);
}

function niceLabel(col){
  if(col === 'comparison_url') return 'Verification Link';
  if(col === 'report_pdf_url' || col === 'pdf_url') return 'Report PDF';
  if(col === 'old_lot') return 'Old Lot';
  if(col === 'new_lot') return 'New Lot';
  if(col === 'pass') return 'Result';
  if(col === 'manufacturer_name') return 'Mfr Name';
  if(col === 'manufacturer_ref') return 'Mfr Ref #';
  if(col === 'pack_size') return 'Pack/Unit Size';
  if(col === 'mckesson_ref') return 'McKesson Ref #';
  if(col === 'source_manifest_url') return 'Source Manifest';
  return col.replace(/_/g,' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
}

function canApprove(row){
  return row.status === 'Pending Review' || row.status === 'Failed - needs investigation';
}

function populateFilterDropdowns(){
  const instSel = document.getElementById('filterInstrument');
  const itemSel = document.getElementById('filterItem');
  const statusSel = document.getElementById('filterStatus');
  const instruments = [...new Set(currentRows.map(function(r){ return r.instrument; }))].sort();
  const items = [...new Set(currentRows.map(function(r){ return r.item; }))].sort();
  const statuses = [...new Set(currentRows.map(function(r){ return r.status; }).filter(Boolean))].sort();
  const prevInst = instSel.value, prevItem = itemSel.value, prevStatus = statusSel.value;
  instSel.innerHTML = '<option value="">All instruments</option>' + instruments.map(function(i){ return '<option value="'+escapeHtml(i)+'">'+escapeHtml(i)+'</option>'; }).join('');
  itemSel.innerHTML = '<option value="">All items</option>' + items.map(function(i){ return '<option value="'+escapeHtml(i)+'">'+escapeHtml(i)+'</option>'; }).join('');
  statusSel.innerHTML = '<option value="">All statuses</option>' +
    (PENDING_STATUS_BY_TABLE[currentTable] ? '<option value="__pending__">\u2b50 Pending only</option>' : '') +
    statuses.map(function(s){
      var label = (STATUS_DISPLAY[s] || { label: s }).label;
      return '<option value="'+escapeHtml(s)+'">'+escapeHtml(label)+'</option>';
    }).join('');
  instSel.value = instruments.indexOf(prevInst) !== -1 ? prevInst : '';
  itemSel.value = items.indexOf(prevItem) !== -1 ? prevItem : '';
  statusSel.value = statuses.indexOf(prevStatus) !== -1 ? prevStatus : '';
}

function pendingCountForCurrentTable(){
  var pendingStatuses = PENDING_STATUS_BY_TABLE[currentTable];
  if(!pendingStatuses) return 0;
  return currentRows.filter(function(r){ return pendingStatuses.indexOf(r.status) !== -1; }).length;
}

function updatePendingBanner(){
  var banner = document.getElementById('pendingBanner');
  var pendingStatuses = PENDING_STATUS_BY_TABLE[currentTable];
  if(!pendingStatuses){ banner.style.display = 'none'; return; }
  var n = pendingCountForCurrentTable();
  if(n === 0){ banner.style.display = 'none'; return; }
  banner.textContent = PENDING_BANNER_LABEL[currentTable](n);
  banner.style.display = 'block';
}

// Sets the status filter to whichever value(s) this table's banner represents
// and re-renders -- if there's more than one pending status for this table
// (e.g. lot_to_lot_reports has two), clears any single-status selection and
// relies on the dedicated pending-status check in the filter itself instead.
function showPendingOnly(){
  document.getElementById('filterStatus').value = '__pending__';
  render();
}

function render(){
  const cols = COLUMN_LABELS[currentTable];
  const showApprove = APPROVABLE_TABLES.indexOf(currentTable) !== -1;
  const showFilters = FILTERABLE_TABLES.indexOf(currentTable) !== -1;
  const showRawData = currentTable === 'reagent_master';
  const showVoid = currentTable === 'lot_to_lot_reports';
  document.getElementById('filterInstrument').style.display = showFilters ? '' : 'none';
  document.getElementById('filterItem').style.display = showFilters ? '' : 'none';
  document.getElementById('filterStatus').style.display = showFilters ? '' : 'none';

  updatePendingBanner();

  const head = document.getElementById('tableHead');
  head.innerHTML = '<tr>' + cols.map(function(c){ return '<th>' + niceLabel(c) + '</th>'; }).join('') + (showRawData ? '<th>Raw Data</th>' : '') + (showApprove ? '<th>Approve</th>' : '') + (showVoid ? '<th>Void</th>' : '') + '</tr>';

  const filterText = document.getElementById('search').value.trim().toLowerCase();
  const instFilter = showFilters ? document.getElementById('filterInstrument').value : '';
  const itemFilter = showFilters ? document.getElementById('filterItem').value : '';
  const statusFilter = showFilters ? document.getElementById('filterStatus').value : '';
  const pendingStatuses = PENDING_STATUS_BY_TABLE[currentTable] || [];

  const filtered = currentRows.filter(function(row){
    if(instFilter && row.instrument !== instFilter) return false;
    if(itemFilter && row.item !== itemFilter) return false;
    if(statusFilter === '__pending__'){
      if(pendingStatuses.indexOf(row.status) === -1) return false;
    } else if(statusFilter && row.status !== statusFilter){
      return false;
    }
    if(!filterText) return true;
    return cols.some(function(c){
      const v = row[c];
      return v != null && String(v).toLowerCase().indexOf(filterText) !== -1;
    });
  });

  const body = document.getElementById('tableBody');
  body.innerHTML = '';
  const rawDataInits = [];
  filtered.forEach(function(row){
    const tr = document.createElement('tr');
    let html = cols.map(function(c){ return '<td>' + formatCell(c, row[c]) + '</td>'; }).join('');
    if(showRawData){
      const domId = 'rd-' + row.id;
      html += '<td>' + RawData.render(domId, row.instrument, row.category, row.item) + '</td>';
      rawDataInits.push([domId, row.instrument, row.category, row.item]);
    }
    if(showApprove){
      html += canApprove(row)
        ? '<td class="approve-cell"><button data-preview-btn>Preview</button><br><input type="text" placeholder="Your name" data-name-input><br><button data-approve-btn>Approve</button><div class="approve-msg" data-msg></div></td>'
        : '<td><span style="color:#bbb;">--</span></td>';
    }
    if(showVoid){
      html += row.status !== 'Voided'
        ? '<td class="approve-cell"><input type="text" placeholder="Your name" data-void-name-input><br><input type="text" placeholder="Reason (optional)" data-void-reason-input><br><button data-void-btn>Void</button><div class="approve-msg" data-void-msg></div></td>'
        : '<td><span style="color:#bbb;">--</span></td>';
    }
    tr.innerHTML = html;
    if(showApprove && canApprove(row)){
      tr.querySelector('[data-approve-btn]').addEventListener('click', function(){
        approve(row, tr);
      });
      tr.querySelector('[data-preview-btn]').addEventListener('click', function(){
        preview(row, tr);
      });
    }
    if(showVoid && row.status !== 'Voided'){
      tr.querySelector('[data-void-btn]').addEventListener('click', function(){
        voidReport(row, tr);
      });
    }
    body.appendChild(tr);
  });
  // Widgets only fetch their file list once they're actually in the DOM.
  rawDataInits.forEach(function(args){ RawData.init.apply(null, args); });

  document.getElementById('empty').style.display = filtered.length === 0 ? 'block' : 'none';
  document.getElementById('count').textContent = filtered.length + ' of ' + currentRows.length + ' row(s)';
}

/**
 * Regenerates the report from stored data and opens it as a PDF in a new
 * tab for review -- WITHOUT uploading anywhere or marking anything reviewed.
 * This is what lets you actually see the report before deciding to approve.
 */
function preview(row, tr){
  const msgEl = tr.querySelector('[data-msg]');
  const btn = tr.querySelector('[data-preview-btn]');
  btn.disabled = true;
  msgEl.textContent = 'Loading...';

  const getHistoryRow = (currentTable === 'lot_to_lot_reports')
    ? Promise.resolve(row)
    : fetch('/api/latest-pending?instrument=' + encodeURIComponent(row.instrument) + '&category=' + encodeURIComponent(row.category) + '&item=' + encodeURIComponent(row.item))
        .then(function(r){ return r.json(); })
        .then(function(d){ if(d.error) throw new Error(d.error); return d; });

  getHistoryRow.then(function(historyRow){
    if(!historyRow.report_data){
      throw new Error('No stored data to preview.');
    }
    const job = historyRow.report_data.job;
    const card = historyRow.report_data.card;

    const target = document.getElementById('pdf-render-target');
    target.innerHTML = buildReportContentHtml(job, [card], null);

    msgEl.textContent = 'Generating preview...';
    window.scrollTo(0, 0);
    return html2pdf().set({ margin: 10, html2canvas: { scale: 1, scrollX: 0, scrollY: 0, windowWidth: 980, width: 980 } }).from(target).toPdf().output('blob');
  })
  .then(function(pdfBlob){
    if(!pdfBlob || pdfBlob.size < 2000){
      throw new Error('Preview looks empty (' + (pdfBlob?pdfBlob.size:0) + ' bytes).');
    }
    window.open(URL.createObjectURL(pdfBlob), '_blank');
    msgEl.textContent = '';
    btn.disabled = false;
  })
  .catch(function(err){
    msgEl.textContent = 'Error: ' + err.message;
    btn.disabled = false;
  })
  .finally(function(){
    document.getElementById('pdf-render-target').innerHTML = '';
  });
}

/**
 * Approving generates the FINAL, reviewer-signed PDF right here in the
 * browser (using the same report.js module the comparison tool uses for
 * its preview), uploads it, then tells the API to finalize both the
 * history row and the current-state row.
 */
function approve(row, tr){
  const nameInput = tr.querySelector('[data-name-input]');
  const msgEl = tr.querySelector('[data-msg]');
  const btn = tr.querySelector('[data-approve-btn]');
  const verifiedBy = nameInput.value.trim();
  if(!verifiedBy){
    msgEl.textContent = 'Enter your name first.';
    return;
  }
  btn.disabled = true;

  const getHistoryRow = (currentTable === 'lot_to_lot_reports')
    ? Promise.resolve(row)
    : fetch('/api/latest-pending?instrument=' + encodeURIComponent(row.instrument) + '&category=' + encodeURIComponent(row.category) + '&item=' + encodeURIComponent(row.item))
        .then(function(r){ return r.json(); })
        .then(function(d){ if(d.error) throw new Error(d.error); return d; });

  msgEl.textContent = 'Loading report data...';

  getHistoryRow.then(function(historyRow){
    if(!historyRow.report_data){
      throw new Error('This report has no stored data to regenerate a PDF from.');
    }
    const job = historyRow.report_data.job;
    const card = historyRow.report_data.card;
    const dateVerified = new Date().toISOString();
    const reviewInfo = { verifiedBy: verifiedBy, dateVerified: dateVerified };

    const target = document.getElementById('pdf-render-target');
    target.innerHTML = buildReportContentHtml(job, [card], reviewInfo);

    msgEl.textContent = 'Generating final PDF...';

    const filename = ('lot_to_lot_FINAL_' + (historyRow.instrument||'report') + '_' + (historyRow.item||'') + '_' + Date.now()).replace(/[^a-zA-Z0-9_\-]+/g,'_') + '.pdf';

    window.scrollTo(0, 0);
    return html2pdf().set({ filename: filename, margin: 10, html2canvas: { scale: 1, scrollX: 0, scrollY: 0, windowWidth: 980, width: 980 } }).from(target).toPdf().output('blob')
      .then(function(pdfBlob){
        if(!pdfBlob || pdfBlob.size < 2000){
          throw new Error('Generated PDF looks empty (' + (pdfBlob?pdfBlob.size:0) + ' bytes). Try again.');
        }
        msgEl.textContent = 'Uploading PDF...';
        return fetch(SUPABASE_URL + '/storage/v1/object/reports/' + filename, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/pdf'
          },
          body: pdfBlob
        }).then(function(uploadRes){
          if(!uploadRes.ok){
            return uploadRes.text().then(function(t){ throw new Error('Upload failed: ' + t); });
          }
          const pdfUrl = SUPABASE_URL + '/storage/v1/object/public/reports/' + filename;
          msgEl.textContent = 'Finalizing...';
          return fetch('/api/approve', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
              historyId: historyRow.id,
              instrument: historyRow.instrument,
              category: historyRow.category,
              item: historyRow.item,
              verifiedBy: verifiedBy,
              pdfUrl: pdfUrl
            })
          }).then(function(r){ return r.json(); });
        });
      });
  })
  .then(function(res){
    if(res.error){
      msgEl.textContent = 'Error: ' + res.error;
      btn.disabled = false;
      return;
    }
    load(currentTable);
  })
  .catch(function(err){
    msgEl.textContent = 'Error: ' + err.message;
    btn.disabled = false;
  })
  .finally(function(){
    document.getElementById('pdf-render-target').innerHTML = '';
  });
}

/**
 * Voids a lot-to-lot report (wrong item, wrong data, accidental
 * submission/approval, etc.) instead of deleting it -- the row stays in
 * the database with who voided it, when, and why, consistent with not
 * silently erasing lab records. If this was the most recent report for
 * that instrument/category/item, the server-side handler also rolls
 * Reagent Master's current-state row back to whatever the next most
 * recent report says (or to "Pending verification" if none remain).
 */
function voidReport(row, tr){
  const nameInput = tr.querySelector('[data-void-name-input]');
  const reasonInput = tr.querySelector('[data-void-reason-input]');
  const msgEl = tr.querySelector('[data-void-msg]');
  const btn = tr.querySelector('[data-void-btn]');
  const voidedBy = nameInput.value.trim();
  if(!voidedBy){
    msgEl.textContent = 'Enter your name first.';
    return;
  }
  if(!confirm('Void this ' + (row.item || 'report') + ' lot-to-lot report? It will stay on record as voided, not deleted.')){
    return;
  }
  btn.disabled = true;
  msgEl.textContent = 'Voiding...';

  fetch('/api/approve?action=void', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      historyId: row.id,
      voidedBy: voidedBy,
      voidReason: reasonInput.value.trim(),
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.error) throw new Error(d.error);
    load(currentTable);
  })
  .catch(function(err){
    msgEl.textContent = 'Error: ' + err.message;
    btn.disabled = false;
  });
}

var reviewQueueRows = [];
var reviewCatalog = [];

function load(table){
  currentTable = table;
  if(table === 'needs_review'){
    document.getElementById('genericToolbar').style.display = 'none';
    document.getElementById('genericTableScroll').style.display = 'none';
    document.getElementById('needsReviewView').style.display = 'block';
    document.getElementById('pendingBanner').style.display = 'none';
    loadNeedsReview();
    return;
  }
  document.getElementById('genericToolbar').style.display = 'flex';
  document.getElementById('genericTableScroll').style.display = 'block';
  document.getElementById('needsReviewView').style.display = 'none';
  document.getElementById('tableBody').innerHTML = '<tr><td>Loading...</td></tr>';
  fetch('/api/browse?table=' + encodeURIComponent(table))
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if(rows.error){ throw new Error(rows.error); }
      currentRows = rows.map(function(r){
        if(r.manifest_uploads){
          r.source_manifest_url = r.manifest_uploads.file_url;
        }
        return r;
      });
      populateFilterDropdowns();
      render();
    })
    .catch(function(err){
      document.getElementById('tableBody').innerHTML = '<tr><td>Error: ' + escapeHtml(err.message) + '</td></tr>';
    });
}

/* ---------- Needs Review ---------- */

function loadNeedsReview(){
  document.getElementById('reviewRows').innerHTML = '<p class="small">Loading...</p>';
  Promise.all([
    fetch('/api/log-shipment?action=review-queue').then(function(r){ return r.json(); }),
    reviewCatalog.length ? Promise.resolve(reviewCatalog) : fetch('/api/catalog').then(function(r){ return r.json(); })
  ]).then(function(results){
    var queue = results[0], catalog = results[1];
    if(queue.error) throw new Error(queue.error);
    reviewQueueRows = queue;
    reviewCatalog = catalog;
    var instruments = [...new Set(catalog.map(function(c){ return c.analyzer; }))].sort();
    document.getElementById('reviewInstrumentList').innerHTML = instruments.map(function(i){ return '<option value="'+escapeHtml(i)+'">'; }).join('');
    renderNeedsReview();
  }).catch(function(err){
    document.getElementById('reviewRows').innerHTML = '<p class="small" style="color:var(--bad);">Error: ' + escapeHtml(err.message) + '</p>';
  });
}

function reviewCatalogOptionsHtml(selectedId){
  var groups = {};
  var order = [];
  reviewCatalog.forEach(function(row){
    if(!groups[row.analyzer]){ groups[row.analyzer] = []; order.push(row.analyzer); }
    groups[row.analyzer].push(row);
  });
  order.sort();
  var html = '<option value=""' + (!selectedId ? ' selected' : '') + '>-- choose a catalog item --</option>' +
    '<option value="__new__"' + (selectedId === '__new__' ? ' selected' : '') + '>+ Add as new catalog item</option>';
  order.forEach(function(instrument){
    html += '<optgroup label="' + escapeHtml(instrument) + '">';
    groups[instrument].forEach(function(row){
      html += '<option value="' + row.id + '"' + (String(row.id)===String(selectedId)?' selected':'') + '>' +
        escapeHtml(row.category) + ' \u2014 ' + escapeHtml(row.item) + '</option>';
    });
    html += '</optgroup>';
  });
  return html;
}

function renderNeedsReview(){
  var statusFilter = document.getElementById('reviewStatusFilter').value;
  var filtered = reviewQueueRows.filter(function(r){ return !statusFilter || r.status === statusFilter; });
  document.getElementById('reviewCount').textContent = filtered.length + ' item' + (filtered.length === 1 ? '' : 's');
  document.getElementById('reviewEmpty').style.display = filtered.length === 0 ? 'block' : 'none';

  document.getElementById('reviewRows').innerHTML = filtered.map(function(row){
    var ex = row.extracted || {};
    var summary = [ex.itemDescription, ex.referenceNumber ? ('Ref: ' + ex.referenceNumber) : null].filter(Boolean).join(' \u00b7 ') || '(no description extracted)';
    var pillCls = row.status === 'resolved' ? 'resolved' : (row.status === 'dismissed' ? 'dismissed' : 'pending');
    var isPending = row.status === 'pending';

    var resolveControls = '';
    if(isPending){
      var newItem = row._newItem || {};
      resolveControls =
        '<div class="review-grid">' +
          '<div><label>Match to catalog item</label><select onchange="onReviewMatchChange(' + row.id + ', this.value)">' + reviewCatalogOptionsHtml(row._matchId) + '</select></div>' +
          '<div><label>Lot #</label><input value="' + escapeHtml(row.lot_number||'') + '" oninput="updateReviewField(' + row.id + ',\'lot_number\',this.value)"></div>' +
          '<div><label>Quantity</label><input type="number" min="0" step="1" value="' + escapeHtml(row.quantity||'') + '" oninput="updateReviewField(' + row.id + ',\'quantity\',this.value)"></div>' +
          '<div><label>Expiration date</label><input type="date" value="' + escapeHtml(row.expiration_date||'') + '" oninput="updateReviewField(' + row.id + ',\'expiration_date\',this.value)"></div>' +
        '</div>' +
        (row._matchId === '__new__' ?
          '<div class="review-new-item-box"><div class="review-grid">' +
            '<div><label>Instrument</label><input list="reviewInstrumentList" value="' + escapeHtml(newItem.analyzer||'') + '" oninput="updateReviewNewItem(' + row.id + ',\'analyzer\',this.value)"></div>' +
            '<div><label>Material type</label><input list="reviewCategoryList" value="' + escapeHtml(newItem.category||'') + '" oninput="updateReviewNewItem(' + row.id + ',\'category\',this.value)"></div>' +
            '<div><label>Item name</label><input value="' + escapeHtml(newItem.item||'') + '" oninput="updateReviewNewItem(' + row.id + ',\'item\',this.value)"></div>' +
            '<div><label>Manufacturer name</label><input value="' + escapeHtml(newItem.manufacturer_name||'') + '" oninput="updateReviewNewItem(' + row.id + ',\'manufacturer_name\',this.value)"></div>' +
            '<div><label>Manufacturer ref #</label><input value="' + escapeHtml(newItem.manufacturer_ref||'') + '" oninput="updateReviewNewItem(' + row.id + ',\'manufacturer_ref\',this.value)"></div>' +
            '<div><label>Pack/unit size</label><input value="' + escapeHtml(newItem.pack_size||'') + '" oninput="updateReviewNewItem(' + row.id + ',\'pack_size\',this.value)"></div>' +
          '</div></div>' : '') +
        '<div class="review-actions">' +
          '<button class="primary" onclick="resolveReviewRow(' + row.id + ')">Resolve &amp; Log Shipment</button>' +
          '<button class="danger" onclick="dismissReviewRow(' + row.id + ')">Dismiss</button>' +
        '</div>' +
        '<div class="review-msg" id="reviewMsg-' + row.id + '"></div>';
    } else {
      resolveControls = '<p class="small">' +
        (row.status === 'resolved' ? 'Resolved' : 'Dismissed') +
        (row.resolved_at ? ' on ' + new Date(row.resolved_at).toLocaleString() : '') + '.' +
        '</p>' +
        '<div class="review-actions"><button onclick="reopenReviewRow(' + row.id + ')">Reopen as Pending</button></div>';
    }

    return '<div class="review-row">' +
      '<div class="review-row-header">' +
        '<div class="review-extracted"><strong>' + escapeHtml(summary) + '</strong>' +
          '<span class="small">Queued ' + new Date(row.created_at).toLocaleString() + (row.received_by ? ' by ' + escapeHtml(row.received_by) : '') +
          (row.manifest_uploads ? ' &mdash; <a class="pdf-link" href="' + escapeHtml(row.manifest_uploads.file_url) + '" target="_blank">View original</a>' : '') +
          '</span>' +
        '</div>' +
        '<span class="pill ' + pillCls + '">' + escapeHtml(row.status) + '</span>' +
      '</div>' +
      resolveControls +
    '</div>';
  }).join('');
}

function findReviewRow(id){
  return reviewQueueRows.find(function(r){ return String(r.id) === String(id); });
}

function updateReviewField(id, field, value){
  var row = findReviewRow(id);
  if(row) row[field] = value;
}

function onReviewMatchChange(id, value){
  var row = findReviewRow(id);
  if(!row) return;
  row._matchId = value;
  if(value === '__new__' && !row._newItem){
    var ex = row.extracted || {};
    row._newItem = {
      analyzer: '', category: '',
      item: ex.itemDescription || '',
      manufacturer_name: '',
      manufacturer_ref: ex.referenceNumber || '',
      pack_size: ''
    };
  }
  renderNeedsReview();
}

function updateReviewNewItem(id, field, value){
  var row = findReviewRow(id);
  if(!row) return;
  if(!row._newItem) row._newItem = {};
  row._newItem[field] = value;
}

function setReviewMsg(id, msg, cls){
  var el = document.getElementById('reviewMsg-' + id);
  if(!el) return;
  el.textContent = msg;
  el.className = 'review-msg' + (cls ? ' ' + cls : '');
}

function resolveReviewRow(id){
  var row = findReviewRow(id);
  if(!row) return;
  if(!row.lot_number){ setReviewMsg(id, 'Enter a lot number first.', 'err'); return; }
  if(!row._matchId){ setReviewMsg(id, 'Match to an existing catalog item or choose "+ Add as new catalog item" first.', 'err'); return; }

  setReviewMsg(id, 'Working...');

  function logAgainst(catalogRow){
    return fetch('/api/log-shipment', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        instrument: catalogRow.analyzer,
        category: catalogRow.category,
        item: catalogRow.item,
        manufacturerRef: catalogRow.manufacturer_ref,
        mckessonRef: catalogRow.mckesson_ref,
        lotNumber: row.lot_number,
        quantity: row.quantity === '' || row.quantity == null ? null : Number(row.quantity),
        expirationDate: row.expiration_date || '',
        receivedBy: row.received_by || '',
        comments: 'Resolved from Needs Review queue'
      })
    }).then(function(r){ return r.json(); }).then(function(res){
      if(res.error) throw new Error(res.error);
      return fetch('/api/log-shipment?action=review-queue', {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ id: row.id, status: 'resolved', resolvedCatalogId: catalogRow.id })
      }).then(function(r){ return r.json(); });
    });
  }

  var chain;
  if(row._matchId === '__new__'){
    var ni = row._newItem || {};
    if(!ni.analyzer || !ni.category || !ni.item){
      setReviewMsg(id, 'Fill in Instrument, Material type, and Item name first.', 'err');
      return;
    }
    chain = fetch('/api/catalog', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        analyzer: ni.analyzer, category: ni.category, item: ni.item,
        manufacturer_name: ni.manufacturer_name || null,
        manufacturer_ref: ni.manufacturer_ref || null,
        pack_size: ni.pack_size || null
      })
    }).then(function(r){ return r.json(); }).then(function(newCatalogRow){
      if(newCatalogRow.error) throw new Error(newCatalogRow.error);
      reviewCatalog.push(newCatalogRow);
      return logAgainst(newCatalogRow);
    });
  } else {
    var catalogRow = reviewCatalog.find(function(c){ return String(c.id) === String(row._matchId); });
    if(!catalogRow){ setReviewMsg(id, 'Could not find that catalog item -- refresh and try again.', 'err'); return; }
    chain = logAgainst(catalogRow);
  }

  chain.then(function(){
    loadNeedsReview();
  }).catch(function(err){
    setReviewMsg(id, 'Error: ' + err.message, 'err');
  });
}

function dismissReviewRow(id){
  if(!confirm('Dismiss this item without logging a shipment? It stays in the Dismissed tab if you need to revisit it.')) return;
  fetch('/api/log-shipment?action=review-queue', {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id: id, status: 'dismissed' })
  }).then(function(r){ return r.json(); }).then(function(){
    loadNeedsReview();
  });
}

function reopenReviewRow(id){
  fetch('/api/log-shipment?action=review-queue', {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id: id, status: 'pending' })
  }).then(function(r){ return r.json(); }).then(function(){
    loadNeedsReview();
  });
}
